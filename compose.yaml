services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: street_world
      POSTGRES_USER: street_world
      POSTGRES_PASSWORD: street_world
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U street_world -d street_world"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      NODE_ENV: production
      TYPEORM_SYNCHRONIZE: "false"
      PORT: 3001
      DB_PATH: /data/street_world.db
      JWT_SECRET: replace-me
      JWT_REFRESH_SECRET: replace-me-refresh
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      PAYMENTS_WEBHOOK_SECRET: replace-me
      PAYMENTS_WEBHOOK_HEADER: x-signature
      PAYMENTS_WEBHOOK_ALGO: hmac-sha256
      PAYMENTS_WEBHOOK_ALLOW_INSECURE: "false"
      PAYMENTS_WEBHOOK_MAX_RETRIES: 5
      PAYMENTS_WEBHOOK_RETRY_BASE_MS: 2000
      PAYMENTS_WEBHOOK_RETRY_MAX_MS: 60000
      PAYMENTS_WEBHOOK_RETRY_BATCH_SIZE: 20
      PAYMENTS_RECONCILE_CRON: "*/1 * * * *"
      PAYMENTS_RECONCILE_EVERY_MS: 60000
      PAYMENTS_PENDING_TIMEOUT_MS: 1800000
      PAYMENTS_ALERT_FAILED_THRESHOLD: 5
      CORS_ORIGINS: http://localhost:3000
      WEB_URL: http://localhost:3000
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://street_world:street_world@postgres:5432/street_world
    ports:
      - "3001:3001"
    volumes:
      - api_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_SITE_URL: http://localhost:3000
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  redisdata:
  api_data:
